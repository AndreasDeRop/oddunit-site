<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OddUnit</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">OddUnit</div>
      <nav>
        <a href="#">About</a>
        <a href="#">Drops</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <canvas id="three-canvas"></canvas>

    <!-- always visible panel -->
    <aside class="ui-panel">
      <div class="copy-parallax" id="copyParallax">

          <div class="badge" id="badge">DROP 01</div>

            Next evolution toy. Smooth finish and attitude. Limited drops

          </p>
          <a class="buy-button" id="buy" href="#">BUY NOW</a>
        </div>
      </div>
    </aside>

    <!-- only for scroll length -->
    <div class="scroll-space"></div>

    <script type="module" src="main.js"></script>
  </body>
