<!doctype html>
<html lang="en" data-theme="lab">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODD UNIT — Studio</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="topbar" aria-hidden="false">
      <div class="logo-mount" id="logoMount" aria-hidden="true"></div>

      <div class="nav-rail">
        <nav class="nav-links" aria-label="Primary">
          <a href="/">HOME</a>
          <a href="/drops">PROJECTS</a>
          <a href="#socials">SOCIALS</a>
          <a href="#about">ABOUT-US</a>
          <a href="#faq">FAQ</a>
        </nav>
      </div>

      <a class="contact-pill" href="#contact">CONTACT US</a>
    </header>

    <!-- INTRO overlay -->
    <div class="landing" id="landing" aria-hidden="false">
      <div class="landing-mark" id="landingMark">
        <span class="plus landing-plus" data-corner="tl"></span>
        <span class="plus landing-plus" data-corner="tr"></span>
        <span class="plus landing-plus" data-corner="bl"></span>
        <span class="plus landing-plus" data-corner="br"></span>
      </div>
    </div>

    <!-- logo used by print fx -->
    <img
      class="logo logo-float"
      id="brandLogo"
      src="/drops/LogoGreen.png"
      alt="ODD UNIT"
      decoding="async"
      fetchpriority="high"
      style="opacity: 0"
    />

    <div id="logoPrintFx" class="logo-printfx logo-float" aria-hidden="true">
      <div class="logo-printfx__printed" aria-hidden="true"></div>
      <div class="logo-printfx__layer" aria-hidden="true"></div>
    </div>

    <!-- HERO -->
    <main class="hero" id="hero" aria-hidden="true">
      <!-- corner pluses -->
      <div class="hero-frame" aria-hidden="true">
        <span class="frame-plus fp-tl" aria-hidden="true"></span>
        <span class="frame-plus fp-tr" aria-hidden="true"></span>
        <span class="frame-plus fp-bl" aria-hidden="true"></span>
        <span class="frame-plus fp-br" aria-hidden="true"></span>
      </div>

      <!-- stage is just a relative positioning context -->
      <section class="hero-stage" aria-label="Hero">
        <!-- dark words -->
        <div class="hero-dark" aria-hidden="true">
          <div class="hero-dark__creatieve">DE&nbsp;CREATIEVE</div>
          <div class="hero-dark__design">DESIGN</div>
        </div>

        <!-- orange words -->
        <h1 class="hero-word word-odd">ODD</h1>
        <h1 class="hero-word word-unit">
          UNIT<span class="unit-mark" aria-hidden="true">
            <span class="unit-star">✶</span>
            <span class="unit-square">.</span>
          </span>
        </h1>

        <h1 class="hero-word word-stu">
          STU<span class="punct" aria-hidden="true">
            <span class="star">✶</span>
            <span class="dot">.</span>
          </span>
        </h1>

        <h1 class="hero-word word-dio">DIO</h1>

        <a class="hero-pill" href="/drops">VIEW WORK</a>

        <p class="hero-copy">
          VAN DIGITAAL<br />
          NAAR TASTBAAR<br />
          MATERIAAL.
        </p>

        <a class="hero-scroll" href="#about">
          SCROLL DOWN
          <span class="hero-scroll__chev" aria-hidden="true">⌄</span>
        </a>
      </section>
    </main>

    <section id="about" class="section"></section>
    <section id="socials" class="section"></section>
    <section id="faq" class="section"></section>
    <section id="contact" class="section"></section>

    <script type="module" src="main.js"></script>
  </body>
</html>
